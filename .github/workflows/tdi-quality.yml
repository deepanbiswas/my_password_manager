# TDI static quality checks (Terraform + shell).
#
# Triggers on pull_request and push when relevant paths change. This includes
# PRs from feature branches such as feature/tdi-iteration-* into main — you do
# not need to push to main for checks to run on a PR.
#
# Live integration (verify.sh over SSH to Azure) is a local or optional
# workflow_dispatch step; merge criteria remain CI green + verify.sh success.

name: tdi-quality

on:
  pull_request:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - "iterations/**"
      - "scripts/**"
      - ".github/workflows/tdi-quality.yml"
      - ".github/workflows/deploy.yml"
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - "iterations/**"
      - "scripts/**"
      - ".github/workflows/tdi-quality.yml"
      - ".github/workflows/deploy.yml"

jobs:
  tdi-quality:
    name: Terraform and shell checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.5.0"

      - name: Terraform fmt, init (no backend), validate (Azure + Hetzner)
        run: |
          set -euo pipefail
          if [ ! -d infrastructure/terraform/azure ] || [ ! -d infrastructure/terraform/hetzner ]; then
            echo "::notice::Expected infrastructure/terraform/azure and hetzner; skipping Terraform checks."
            exit 0
          fi
          terraform fmt -check -recursive infrastructure/terraform
          export TF_VAR_domain="https://ci.validate.invalid"
          for root in azure hetzner; do
            tf="infrastructure/terraform/${root}"
            echo "==> ${tf}"
            mkdir -p "${tf}/.ci-terraform"
            ssh-keygen -t rsa -b 4096 -f "${tf}/.ci-terraform/ci" -N "" -q
            export TF_VAR_ssh_public_key_path="$(pwd)/${tf}/.ci-terraform/ci.pub"
            if [ "$root" = "hetzner" ]; then
              export HCLOUD_TOKEN="invalid-token-for-validate-only"
            else
              unset HCLOUD_TOKEN || true
            fi
            (cd "$tf" && terraform init -backend=false -input=false && terraform validate)
          done

      - name: Shellcheck
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shopt -s nullglob
          files=()
          for d in iterations infrastructure/terraform/shared/scripts infrastructure/terraform/scripts infrastructure/scripts scripts; do
            if [ -d "$d" ]; then
              while IFS= read -r -d '' f; do
                files+=("$f")
              done < <(find "$d" -type f -name '*.sh' -print0 2>/dev/null || true)
            fi
          done
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::notice::No shell scripts under iterations/, infrastructure/**/scripts, or scripts/; skipping shellcheck."
            exit 0
          fi
          shellcheck -e SC1091 "${files[@]}"

      - name: Validate workflow YAML syntax
        run: |
          set -euo pipefail
          ruby -ryaml -e 'Dir[".github/workflows/*.yml"].each { |f| YAML.load_file(f); puts "OK #{f}" }'
