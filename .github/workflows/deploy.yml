# Deploy workflow: Terraform (Azure or Hetzner per HOSTING_PROVIDER) + VM deploy + light skip gate.
#
# Modes:
# - Terraform Azure: vars.HOSTING_PROVIDER empty or "azure", and AZURE_CREDENTIALS set
# - Terraform Hetzner: HOSTING_PROVIDER=hetzner and HCLOUD_TOKEN set
# - VM-only: neither Terraform path runs, but VM_PUBLIC_IP + VM_USERNAME + DOMAIN + SSH_PRIVATE_KEY set
# - Skipped: no Terraform path and incomplete VM secrets → deploy-notice
#
# PAUSED: push-triggered runs are disabled (operator undeploy / teardown). Re-add a `push:` block
# under `on:` when you want automatic deploys on infrastructure changes again. Manual runs only:

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        type: choice
        options:
          - production
          - staging
        default: production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-config:
    name: deploy-config
    runs-on: ubuntu-latest
    outputs:
      hosting_provider: ${{ steps.flags.outputs.hosting_provider }}
      has_vm_secrets: ${{ steps.flags.outputs.has_vm_secrets }}
      run_terraform_azure: ${{ steps.flags.outputs.run_terraform_azure }}
      run_terraform_hetzner: ${{ steps.flags.outputs.run_terraform_hetzner }}
    steps:
      - id: flags
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          hp='${{ vars.HOSTING_PROVIDER }}'
          if [ -z "$hp" ]; then hp=azure; fi
          echo "hosting_provider=$hp" >> "$GITHUB_OUTPUT"
          echo "has_vm_secrets=${{ secrets.VM_PUBLIC_IP != '' && secrets.VM_USERNAME != '' && secrets.DOMAIN != '' && secrets.SSH_PRIVATE_KEY != '' }}" >> "$GITHUB_OUTPUT"
          ra=false
          rh=false
          if [ "$hp" = "azure" ] && [ -n "${AZURE_CREDENTIALS:-}" ]; then ra=true; fi
          if [ "$hp" = "hetzner" ] && [ -n "${HCLOUD_TOKEN:-}" ]; then rh=true; fi
          echo "run_terraform_azure=$ra" >> "$GITHUB_OUTPUT"
          echo "run_terraform_hetzner=$rh" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Terraform — Azure
  # ---------------------------------------------------------------------------
  terraform-plan-azure:
    name: terraform-plan-azure
    needs: deploy-config
    if: needs.deploy-config.outputs.run_terraform_azure == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Configure Azure credentials
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Reference individual Azure secrets
        run: ":"
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Prepare SSH public key for Terraform
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash infrastructure/scripts/ci-prepare-ssh-for-terraform.sh

      - name: Terraform Init
        working-directory: infrastructure/terraform/azure
        run: terraform init -input=false
        env:
          TF_VAR_domain: ${{ secrets.DOMAIN }}

      - name: Terraform Validate
        working-directory: infrastructure/terraform/azure
        run: terraform validate
        env:
          TF_VAR_domain: ${{ secrets.DOMAIN }}

      - name: Terraform Plan
        working-directory: infrastructure/terraform/azure
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_domain: ${{ secrets.DOMAIN }}

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-azure
          path: infrastructure/terraform/azure/tfplan
          if-no-files-found: error

  terraform-apply-azure:
    name: terraform-apply-azure
    needs:
      - deploy-config
      - terraform-plan-azure
    if: needs.deploy-config.outputs.run_terraform_azure == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Configure Azure credentials
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Reference individual Azure secrets
        run: ":"
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Download Terraform plan
        uses: actions/download-artifact@v8
        with:
          name: tfplan-azure
          path: infrastructure/terraform/azure

      - name: Prepare SSH public key for Terraform
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash infrastructure/scripts/ci-prepare-ssh-for-terraform.sh

      - name: Terraform Init
        working-directory: infrastructure/terraform/azure
        run: terraform init -input=false
        env:
          TF_VAR_domain: ${{ secrets.DOMAIN }}

      - name: Terraform Apply
        working-directory: infrastructure/terraform/azure
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_domain: ${{ secrets.DOMAIN }}

      - name: Get VM Public IP
        id: vmip
        working-directory: infrastructure/terraform/azure
        run: |
          echo "public_ip=$(terraform output -raw vm_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Light gate (verify-vm + iteration 3)
        id: light_gate
        env:
          VM_PUBLIC_IP: ${{ steps.vmip.outputs.public_ip }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          DOMAIN: ${{ secrets.DOMAIN }}
          TERRAFORM_DIR: ${{ github.workspace }}/infrastructure/terraform/azure
          GITHUB_ACTIONS: "true"
        run: |
          set -euo pipefail
          chmod +x infrastructure/scripts/verify-vm-deployment.sh
          chmod +x iterations/iteration-3-services/verify.sh
          if infrastructure/scripts/verify-vm-deployment.sh && \
             iterations/iteration-3-services/verify.sh; then
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Application Configuration
        if: steps.light_gate.outputs.skip_deploy != 'true'
        env:
          VM_PUBLIC_IP: ${{ steps.vmip.outputs.public_ip }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          DOMAIN: ${{ secrets.DOMAIN }}
          REPO_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          chmod +x infrastructure/scripts/deploy-to-vm.sh
          infrastructure/scripts/deploy-to-vm.sh

      - name: Verify Deployment
        if: steps.light_gate.outputs.skip_deploy != 'true'
        env:
          VM_PUBLIC_IP: ${{ steps.vmip.outputs.public_ip }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          set -euo pipefail
          chmod +x infrastructure/scripts/verify-vm-deployment.sh
          infrastructure/scripts/verify-vm-deployment.sh

  # ---------------------------------------------------------------------------
  # Terraform — Hetzner
  # ---------------------------------------------------------------------------
  terraform-plan-hetzner:
    name: terraform-plan-hetzner
    needs: deploy-config
    if: needs.deploy-config.outputs.run_terraform_hetzner == 'true'
    runs-on: ubuntu-latest
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Prepare SSH public key for Terraform
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash infrastructure/scripts/ci-prepare-ssh-for-terraform.sh

      - name: Terraform Init
        working-directory: infrastructure/terraform/hetzner
        run: terraform init -input=false
        env:
          TF_VAR_domain: ${{ secrets.DOMAIN }}

      - name: Show remote state (sanity check)
        working-directory: infrastructure/terraform/hetzner
        run: terraform state list

      - name: Terraform Validate
        working-directory: infrastructure/terraform/hetzner
        run: terraform validate
        env:
          TF_VAR_domain: ${{ secrets.DOMAIN }}

      - name: Terraform Plan
        working-directory: infrastructure/terraform/hetzner
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_domain: ${{ secrets.DOMAIN }}

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-hetzner
          path: infrastructure/terraform/hetzner/tfplan
          if-no-files-found: error

  terraform-apply-hetzner:
    name: terraform-apply-hetzner
    needs:
      - deploy-config
      - terraform-plan-hetzner
    if: needs.deploy-config.outputs.run_terraform_hetzner == 'true'
    runs-on: ubuntu-latest
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Download Terraform plan
        uses: actions/download-artifact@v8
        with:
          name: tfplan-hetzner
          path: infrastructure/terraform/hetzner

      - name: Prepare SSH public key for Terraform
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash infrastructure/scripts/ci-prepare-ssh-for-terraform.sh

      - name: Terraform Init
        working-directory: infrastructure/terraform/hetzner
        run: terraform init -input=false
        env:
          TF_VAR_domain: ${{ secrets.DOMAIN }}

      - name: Terraform Apply
        working-directory: infrastructure/terraform/hetzner
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_domain: ${{ secrets.DOMAIN }}

      - name: Get VM Public IP
        id: vmip
        working-directory: infrastructure/terraform/hetzner
        run: |
          echo "public_ip=$(terraform output -raw vm_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Light gate (verify-vm + iteration 3)
        id: light_gate
        env:
          VM_PUBLIC_IP: ${{ steps.vmip.outputs.public_ip }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          DOMAIN: ${{ secrets.DOMAIN }}
          TERRAFORM_DIR: ${{ github.workspace }}/infrastructure/terraform/hetzner
          GITHUB_ACTIONS: "true"
        run: |
          set -euo pipefail
          chmod +x infrastructure/scripts/verify-vm-deployment.sh
          chmod +x iterations/iteration-3-services/verify.sh
          if infrastructure/scripts/verify-vm-deployment.sh && \
             iterations/iteration-3-services/verify.sh; then
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Application Configuration
        if: steps.light_gate.outputs.skip_deploy != 'true'
        env:
          VM_PUBLIC_IP: ${{ steps.vmip.outputs.public_ip }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          DOMAIN: ${{ secrets.DOMAIN }}
          REPO_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          chmod +x infrastructure/scripts/deploy-to-vm.sh
          infrastructure/scripts/deploy-to-vm.sh

      - name: Verify Deployment
        if: steps.light_gate.outputs.skip_deploy != 'true'
        env:
          VM_PUBLIC_IP: ${{ steps.vmip.outputs.public_ip }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          set -euo pipefail
          chmod +x infrastructure/scripts/verify-vm-deployment.sh
          infrastructure/scripts/verify-vm-deployment.sh

  # ---------------------------------------------------------------------------
  # VM-only path
  # ---------------------------------------------------------------------------
  vm-deploy:
    name: vm-deploy
    needs: deploy-config
    if: needs.deploy-config.outputs.run_terraform_azure != 'true' && needs.deploy-config.outputs.run_terraform_hetzner != 'true' && needs.deploy-config.outputs.has_vm_secrets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Light gate (verify-vm + iteration 3)
        id: light_gate
        env:
          VM_PUBLIC_IP: ${{ secrets.VM_PUBLIC_IP }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          DOMAIN: ${{ secrets.DOMAIN }}
          GITHUB_ACTIONS: "true"
        run: |
          set -euo pipefail
          chmod +x infrastructure/scripts/verify-vm-deployment.sh
          chmod +x iterations/iteration-3-services/verify.sh
          if infrastructure/scripts/verify-vm-deployment.sh && \
             iterations/iteration-3-services/verify.sh; then
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Application Configuration
        if: steps.light_gate.outputs.skip_deploy != 'true'
        env:
          VM_PUBLIC_IP: ${{ secrets.VM_PUBLIC_IP }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          DOMAIN: ${{ secrets.DOMAIN }}
          REPO_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          chmod +x infrastructure/scripts/deploy-to-vm.sh
          infrastructure/scripts/deploy-to-vm.sh

      - name: Verify Deployment
        if: steps.light_gate.outputs.skip_deploy != 'true'
        env:
          VM_PUBLIC_IP: ${{ secrets.VM_PUBLIC_IP }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          set -euo pipefail
          chmod +x infrastructure/scripts/verify-vm-deployment.sh
          infrastructure/scripts/verify-vm-deployment.sh

  deploy-notice:
    name: deploy-notice
    needs: deploy-config
    if: needs.deploy-config.outputs.run_terraform_azure != 'true' && needs.deploy-config.outputs.run_terraform_hetzner != 'true' && needs.deploy-config.outputs.has_vm_secrets != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip (no Terraform path and no full VM secret set)
        run: |
          echo "Deploy skipped: set HOSTING_PROVIDER=azure with AZURE_CREDENTIALS, or HOSTING_PROVIDER=hetzner with HCLOUD_TOKEN, or set VM_PUBLIC_IP, VM_USERNAME, DOMAIN, and SSH_PRIVATE_KEY for VM-only deploy."
          echo "See docs/cicd-pipelines.md"
